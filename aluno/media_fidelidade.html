<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFFFFF">
    <title>Area do Aluno - Media Fidelidade</title>
    <style>
        :root {
            --page: #ffffff;
            --surface: #f4f4f4;
            --surface-soft: #fafafa;
            --ink: #111111;
            --muted: #5f5f5f;
            --line: #222222;
            --line-soft: #9a9a9a;
            --fill: #e6e6e6;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-width: 320px;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--page);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
        }

        .phone {
            width: 100%;
            max-width: 430px;
            min-height: 820px;
            position: relative;
            overflow: hidden;
            background: var(--page);
            border: 2px solid var(--line);
        }

        .icon {
            width: 22px;
            height: 22px;
            display: block;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .box {
            border: 1.5px solid var(--line);
            background: var(--surface-soft);
        }

        .dashed {
            border-style: dashed;
            border-color: var(--line-soft);
        }

        .label {
            margin: 0;
            color: var(--muted);
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .header {
            padding: 1rem 1rem 1.25rem;
            border-bottom: 2px solid var(--line);
            background: var(--surface);
        }

        .header-row {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr) 44px;
            align-items: center;
            gap: 0.75rem;
        }

        .icon-box {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            color: var(--ink);
        }

        .brand-box {
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: var(--radius-sm);
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0;
        }

        .header-title {
            margin-top: 1rem;
            text-align: center;
        }

        .header-title h1 {
            margin: 0.2rem 0 0;
            font-size: 1.25rem;
            line-height: 1.15;
        }

        .header-title p:last-child {
            margin: 0.25rem 0 0;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .drawer-note {
            margin: 0.75rem 1rem 0;
            padding: 0.7rem;
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr);
            gap: 0.65rem;
            align-items: start;
            border-radius: var(--radius-md);
            color: var(--muted);
            font-size: 0.72rem;
            line-height: 1.35;
        }

        .drawer-note strong {
            display: block;
            margin-bottom: 0.2rem;
            color: var(--ink);
            font-size: 0.72rem;
            text-transform: uppercase;
        }

        .content {
            padding: 0.75rem 1rem 6.4rem;
        }

        .student-card {
            padding: 0.85rem;
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr) 24px;
            align-items: center;
            gap: 0.75rem;
            border-radius: var(--radius-md);
            background: var(--surface);
        }

        .avatar-box {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: var(--radius-sm);
            background: var(--fill);
        }

        .placeholder-line {
            height: 10px;
            border-radius: 99px;
            background: #cfcfcf;
        }

        .placeholder-line.short { width: 54%; margin-top: 0.5rem; }
        .placeholder-line.long { width: 88%; }
        .placeholder-line.mid { width: 72%; }

        .search-box {
            min-height: 50px;
            margin-top: 1rem;
            padding: 0.8rem 0.9rem;
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr) 24px;
            align-items: center;
            gap: 0.75rem;
            border-radius: var(--radius-md);
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
        }

        .chips {
            margin-top: 0.75rem;
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr;
            gap: 0.5rem;
        }

        .chip {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            border-radius: 99px;
            color: var(--ink);
            font-size: 0.68rem;
            font-weight: 700;
        }

        .chip .icon {
            width: 16px;
            height: 16px;
        }

        .section-heading {
            margin: 1.15rem 0 0.65rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .section-heading h2 {
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.95rem;
        }

        .section-heading .icon {
            width: 19px;
            height: 19px;
        }

        .count-box {
            width: 58px;
            height: 24px;
            border-radius: 99px;
        }

        .equipment-list {
            display: grid;
            gap: 0.7rem;
        }

        .equipment-card {
            min-height: 118px;
            padding: 0.85rem;
            display: grid;
            grid-template-columns: 74px minmax(0, 1fr);
            gap: 0.8rem;
            border-radius: var(--radius-md);
        }

        .visual-box {
            min-height: 88px;
            display: grid;
            place-items: center;
            border-radius: var(--radius-sm);
            background: var(--fill);
        }

        .visual-box .icon {
            width: 34px;
            height: 34px;
        }

        .card-copy {
            min-width: 0;
            display: grid;
            align-content: center;
            gap: 0.5rem;
        }

        .meta-row {
            display: grid;
            grid-template-columns: 1fr 74px;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.2rem;
        }

        .action-box {
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            border-radius: var(--radius-sm);
            color: var(--ink);
            font-size: 0.62rem;
            font-weight: 800;
        }

        .action-box .icon {
            width: 15px;
            height: 15px;
        }

        .loan-panel {
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .loan-row {
            min-height: 64px;
            padding: 0.8rem;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 66px;
            align-items: center;
            gap: 0.7rem;
            border-bottom: 1.5px dashed var(--line-soft);
        }

        .loan-row:last-child { border-bottom: 0; }

        .loan-info {
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr);
            align-items: center;
            gap: 0.65rem;
        }

        .mini-icon {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: var(--radius-sm);
            background: var(--fill);
        }

        .mini-icon .icon {
            width: 20px;
            height: 20px;
        }

        .status-box {
            height: 26px;
            display: grid;
            place-items: center;
            border-radius: 99px;
            color: var(--ink);
            font-size: 0.58rem;
            font-weight: 800;
        }

        .new-loan-box {
            min-height: 82px;
            margin-top: 0.75rem;
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem;
            border-radius: var(--radius-md);
        }

        .plus-box {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: var(--fill);
        }

        .bottom-nav {
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            min-height: 76px;
            padding: 0.5rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.25rem;
            border-top: 2px solid var(--line);
            background: var(--surface);
        }

        .nav-box {
            min-height: 58px;
            display: grid;
            place-items: center;
            align-content: center;
            gap: 0.25rem;
            border-radius: var(--radius-sm);
            color: var(--ink);
            font-size: 0.58rem;
            font-weight: 700;
            text-align: center;
        }

        .nav-box .icon {
            width: 20px;
            height: 20px;
        }

        @media (min-width: 640px) {
            body { padding: 2rem 0; }

            .phone {
                min-height: 820px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="phone" aria-label="Diagrama de media fidelidade da tela do aluno">
        <header class="header" aria-label="Cabecalho do aplicativo do aluno">
            <div class="header-row">
                <div class="icon-box box" aria-label="Icone de menu">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </div>
                <div class="brand-box box" aria-label="Area da marca UTFPR">UTFPR</div>
                <div class="icon-box box" aria-label="Icone de notificacoes">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 21h4"/><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/></svg>
                </div>
            </div>
            <div class="header-title">
                <p class="label">Controle patrimonial</p>
                <h1>Almoxarifado</h1>
                <p>Campus Curitiba</p>
            </div>
        </header>

        <div class="content">
            <section class="student-card box" aria-label="Cartao de identificacao do aluno">
                <div class="avatar-box">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                </div>
                <div>
                    <p class="label">Identificacao do aluno</p>
                    <div class="placeholder-line long" aria-hidden="true"></div>
                    <div class="placeholder-line short" aria-hidden="true"></div>
                </div>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
            </section>

            <section aria-label="Busca e filtros de equipamentos">
                <div class="search-box box">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <span>Campo de busca: equipamento, codigo ou categoria</span>
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>
                </div>

                <div class="chips" aria-label="Filtros conceituais">
                    <div class="chip box">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        Todos
                    </div>
                    <div class="chip box">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
                        Disponiveis
                    </div>
                    <div class="chip box">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7h-9M14 17H4"/><circle cx="7" cy="7" r="3"/><circle cx="17" cy="17" r="3"/></svg>
                        Categoria
                    </div>
                </div>
            </section>

            <section aria-label="Lista de equipamentos">
                <div class="section-heading">
                    <h2>
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h12v12H6z"/><path d="M9 2v4M15 2v4M9 18v4M15 18v4M2 9h4M2 15h4M18 9h4M18 15h4"/></svg>
                        Equipamentos
                    </h2>
                    <div class="count-box box dashed" aria-label="Contador de resultados"></div>
                </div>

                <div class="equipment-list">
                    <article class="equipment-card box" aria-label="Card conceitual de equipamento">
                        <div class="visual-box">
                            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="12" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                        </div>
                        <div class="card-copy">
                            <p class="label">Categoria</p>
                            <div class="placeholder-line long" aria-hidden="true"></div>
                            <div class="placeholder-line short" aria-hidden="true"></div>
                            <div class="meta-row">
                                <div class="placeholder-line mid" aria-hidden="true"></div>
                                <div class="action-box box dashed">
                                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                                    CTA
                                </div>
                            </div>
                        </div>
                    </article>

                    <article class="equipment-card box" aria-label="Segundo card conceitual de equipamento">
                        <div class="visual-box">
                            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a4 4 0 1 0-4-4"/><path d="M4 14v4h16v-4"/><path d="M8 22h8"/></svg>
                        </div>
                        <div class="card-copy">
                            <p class="label">Categoria</p>
                            <div class="placeholder-line long" aria-hidden="true"></div>
                            <div class="placeholder-line short" aria-hidden="true"></div>
                            <div class="meta-row">
                                <div class="placeholder-line mid" aria-hidden="true"></div>
                                <div class="action-box box dashed">
                                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                                    CTA
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
            </section>

            <section aria-label="Resumo de emprestimos do aluno">
                <div class="section-heading">
                    <h2>
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5h6"/><path d="M9 12h6"/><path d="M9 19h6"/><path d="M5 5h.01M5 12h.01M5 19h.01"/></svg>
                        Meus emprestimos
                    </h2>
                    <div class="count-box box dashed" aria-label="Link conceitual ver todos"></div>
                </div>

                <div class="loan-panel box">
                    <article class="loan-row" aria-label="Linha conceitual de emprestimo">
                        <div class="loan-info">
                            <div class="mini-icon">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a4 4 0 1 0-4-4"/><path d="M4 14v4h16v-4"/></svg>
                            </div>
                            <div>
                                <div class="placeholder-line long" aria-hidden="true"></div>
                                <div class="placeholder-line short" aria-hidden="true"></div>
                            </div>
                        </div>
                        <div class="status-box box dashed">Status</div>
                    </article>
                </div>

                <div class="new-loan-box box dashed" aria-label="Area conceitual para novo emprestimo">
                    <div class="plus-box">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                    </div>
                    <div>
                        <p class="label">Novo emprestimo</p>
                        <div class="placeholder-line long" aria-hidden="true"></div>
                        <div class="placeholder-line short" aria-hidden="true"></div>
                    </div>
                </div>
            </section>
        </div>

        <nav class="bottom-nav" aria-label="Navegacao inferior conceitual">
            <div class="nav-box box">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
                <span>Inicio</span>
            </div>
            <div class="nav-box box">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span>Pesquisar</span>
            </div>
            <div class="nav-box box">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5h6"/><path d="M9 12h6"/><path d="M9 19h6"/><path d="M5 5h.01M5 12h.01M5 19h.01"/></svg>
                <span>Emprestimos</span>
            </div>
            <div class="nav-box box">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                <span>Perfil</span>
            </div>
        </nav>
    </main>
</body>
</html>
